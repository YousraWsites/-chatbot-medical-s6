<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulter l'assistant — MediGuide</title>
    <meta name="description" content="Posez votre question médicale à MediGuide, votre assistant santé virtuel.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; background: var(--teal-50); }
        .consult-header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: saturate(180%) blur(10px);
            border-bottom: 1px solid var(--gray-100);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .consult-header .brand { font-size: 0.95rem; }
        .consult-header .brand-icon { font-size: 1.2rem; }
        .consult-actions { display: flex; align-items: center; gap: 16px; }
        .consult-actions .disclaimer-pill {
            background: var(--teal-50);
            color: var(--teal-900);
            border: 1px solid var(--teal-100);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .consult-actions a {
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .consult-actions a:hover { color: var(--teal-700); }
        .consult-frame-wrap {
            flex: 1;
            display: flex;
            position: relative;
            background: var(--white);
        }
        .consult-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--teal-50);
            color: var(--teal-700);
            font-size: 0.95rem;
            font-weight: 500;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .loading.hide { opacity: 0; }
        .loading .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--teal-500);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading .dot:nth-child(1) { animation-delay: -0.32s; }
        .loading .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @media (max-width: 720px) {
            .consult-actions .disclaimer-pill { display: none; }
        }
    </style>
</head>
<body>
    <header class="consult-header">
        <a href="/" class="brand">
            <span class="brand-icon">🏥</span>
            <span class="brand-name">MediGuide</span>
        </a>
        <div class="consult-actions">
            <span class="disclaimer-pill">⚠️ Informatif uniquement — pas un avis médical</span>
            <a href="/">← Retour au site</a>
        </div>
    </header>
    <div class="consult-frame-wrap">
        <div class="loading" id="loading">
            <span>Chargement de l'assistant&nbsp;</span>
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <iframe
            class="consult-frame"
            src="/app/"
            title="MediGuide — Assistant médical"
            onload="document.getElementById('loading').classList.add('hide')"
            allow="microphone"></iframe>
    </div>
</body>
</html>
